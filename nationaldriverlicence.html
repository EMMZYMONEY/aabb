<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>National Driver’s Licence Application – ABILINCOLN ENTERPRISES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .form-container {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      color: #374151;
    }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 1.3rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .submit-btn {
      background: #16a34a;
      color: white;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) {
      background: #15803d;
    }
    .submit-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .form-title {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .intro-text {
      text-align: center;
      color: #4b5563;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="container">
      <div class="logo">
        <div class="logo-circle">A</div>
        <span style="font-weight:700; font-size:1.4rem;">ABILINCOLN</span>
      </div>
      <div>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="request.html">Request</a>
        <a href="payment.html">Payment</a>
      </div>
      <a href="https://wa.me/2347032623229?text=Hello%20I%20want%20information%20about%20your%20services" class="btn-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="form-container">
        <h2 class="form-title">National Driver’s Licence Application</h2>
        <p class="intro-text">Please fill in your details accurately. After submission, you will be redirected to make payment.</p>

        <form id="nationalForm">
          <input type="hidden" name="service" value="Driver Licence">

          <label>NIN</label>
          <input type="text" name="nin" placeholder="National Identification Number" required>

          <label>SURNAME</label>
          <input type="text" name="surname" required>

          <label>FIRST NAME</label>
          <input type="text" name="first_name" required>

          <label>MIDDLE NAME</label>
          <input type="text" name="middle_name">

          <label>DATE OF BIRTH</label>
          <input type="date" name="dob" required>

          <label>GENDER</label>
          <select name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>

          <label>BLOOD GROUP</label>
          <input type="text" name="blood_group" placeholder="e.g. O+, A-, B+" required>

          <label>FACIAL MARK</label>
          <input type="text" name="facial_mark" placeholder="e.g. None, Scar on left cheek, etc.">

          <label>GLASS (Do you wear glasses?)</label>
          <select name="glass" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>

          <label>MOTHER MAIDEN NAME</label>
          <input type="text" name="mother_maiden_name" required>

          <label>STATE</label>
          <input type="text" name="state" required>

          <label>L.G.A</label>
          <input type="text" name="lga" placeholder="Local Government Area" required>

          <label>PHONE</label>
          <input type="tel" name="phone" required>

          <label>ADDRESS</label>
          <textarea name="address" rows="3" required></textarea>

          <label>NEXT OF KIN PHONE NO</label>
          <input type="tel" name="next_of_kin_phone" required>

          <button type="submit" class="submit-btn" id="submitBtn">Submit & Proceed to Payment</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>© 2026 ABILINCOLN ENTERPRISES • +234 703 262 3229 • Reliable & CAC Registered</p>
    </div>
  </footer>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/2347032623229?text=Hello%20from%20National%20Driver%20Licence%20form" class="floating-whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>
    const API_URL = "https://abilincoln-backend.onrender.com";
    const SERVICE_NAME = "Driver Licence";           // must match key in your backend prices object
    const FALLBACK_PRICE = 15000;

    async function getCurrentPrice() {
      try {
        const res = await fetch(`${API_URL}/api/settings`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        return data.prices?.[SERVICE_NAME] || FALLBACK_PRICE;
      } catch (e) {
        console.error("Failed to fetch current price", e);
        return FALLBACK_PRICE;
      }
    }

    document.getElementById("nationalForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Submitting...";

      const formData = new FormData(this);

      try {
        const response = await fetch("https://formspree.io/f/mbdzawvj", {
          method: "POST",
          body: formData,
          headers: { "Accept": "application/json" }
        });

        if (response.ok) {
          const price = await getCurrentPrice();
          window.location.href = `payment.html?service=${encodeURIComponent("Driver Licence")}&price=${encodeURIComponent(price)}`;
        } else {
          alert("Submission failed. Please try again or contact us on WhatsApp.");
        }
      } catch (err) {
        alert("Network error. Please check your internet connection.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit & Proceed to Payment";
      }
    });
  </script>
</body>
</html>
